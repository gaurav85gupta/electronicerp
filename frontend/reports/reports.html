<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electronics ERP — Reports</title>
  <link rel="stylesheet" href="../dashboard/dashboard.css" />
  <link rel="stylesheet" href="../master-data/master-data.css" />
  <link rel="stylesheet" href="reports.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-left">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="brand">
          <div class="brand-logo">EE</div>
          <span class="brand-name">Electronics ERP</span>
        </div>
      </div>

      <div class="header-right">
        <span id="current-date" class="current-date"></span>
        <div class="user-info">
          <div class="user-details">
            <span id="user-name" class="user-name">—</span>
            <span id="user-role" class="user-role">—</span>
          </div>
          <div class="user-avatar" id="user-avatar">—</div>
        </div>
        <button id="logout-button" class="logout-button">Logout</button>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
          <a href="../dashboard/dashboard.html" class="nav-item" data-nav="dashboard">
            <span class="nav-icon" aria-hidden="true">▦</span>
            <span class="nav-label">Dashboard</span>
          </a>
          <a href="../inventory/inventory.html" class="nav-item" data-nav="inventory">
            <span class="nav-icon" aria-hidden="true">▢</span>
            <span class="nav-label">Inventory</span>
          </a>
          <a href="../purchase/purchase.html" class="nav-item" data-nav="purchase">
            <span class="nav-icon" aria-hidden="true">▤</span>
            <span class="nav-label">Purchase</span>
          </a>
          <a href="../billing/billing.html" class="nav-item" data-nav="billing">
            <span class="nav-icon" aria-hidden="true">▥</span>
            <span class="nav-label">Billing (POS)</span>
          </a>
          <a href="../customers/customers.html" class="nav-item" data-nav="customers">
            <span class="nav-icon" aria-hidden="true">◔</span>
            <span class="nav-label">Customers</span>
          </a>
          <a href="../master-data/master-data.html" class="nav-item" data-nav="master-data">
            <span class="nav-icon" aria-hidden="true">◑</span>
            <span class="nav-label">Master Data</span>
          </a>
          <a href="../product-master/product-master.html" class="nav-item" data-nav="product-master">
            <span class="nav-icon" aria-hidden="true">▧</span>
            <span class="nav-label">Product Master</span>
          </a>
          <a href="reports.html" class="nav-item active" data-nav="reports">
            <span class="nav-icon" aria-hidden="true">▧</span>
            <span class="nav-label">Reports</span>
          </a>
          <a href="../settings/settings.html" class="nav-item" data-nav="settings">
            <span class="nav-icon" aria-hidden="true">⚙</span>
            <span class="nav-label">Settings</span>
          </a>
        </nav>

        <button id="sidebar-logout" class="sidebar-logout">
          <span class="nav-icon" aria-hidden="true">⏻</span>
          <span class="nav-label">Logout</span>
        </button>
      </aside>

      <main class="main-content">
        <div class="content-header">
          <h1 class="page-title">Reports</h1>
          <p class="page-subtitle">Live, read-only reports generated directly from your business data.</p>
        </div>

        <div class="report-tabs" id="report-tabs" role="tablist"></div>

        <section class="summary-grid" id="summary-grid" aria-label="Report summary"></section>

        <section class="master-panel">
          <div class="panel-toolbar">
            <div class="search-box">
              <span class="search-icon" aria-hidden="true">⌕</span>
              <input type="text" id="search-input" placeholder="Search..." />
            </div>
            <div class="toolbar-actions" id="filter-controls"></div>
          </div>

          <div class="report-actions-bar">
            <div class="report-actions-left" id="sort-controls"></div>
            <div class="report-actions-right">
              <button type="button" class="btn-secondary" id="print-button">Print</button>
              <div class="export-dropdown">
                <button type="button" class="btn-primary" id="export-toggle">Export ▾</button>
                <div class="export-menu" id="export-menu" hidden>
                  <button type="button" data-format="pdf">Export as PDF</button>
                  <button type="button" data-format="xlsx">Export as Excel</button>
                  <button type="button" data-format="csv">Export as CSV</button>
                </div>
              </div>
            </div>
          </div>

          <div class="table-wrapper">
            <table class="data-table" id="data-table">
              <thead>
                <tr id="table-head-row"></tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>

            <div class="table-state" id="loading-state" hidden>
              <p>Loading report...</p>
            </div>

            <div class="table-state" id="empty-state" hidden>
              <p id="empty-state-text">No records found for the selected filters.</p>
            </div>
          </div>

          <div class="pagination-bar" id="pagination-bar" hidden>
            <span class="pagination-info" id="pagination-info"></span>
            <div class="pagination-controls">
              <button type="button" id="prev-page" class="pagination-btn">Previous</button>
              <span class="pagination-current" id="pagination-current"></span>
              <button type="button" id="next-page" class="pagination-btn">Next</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../permissions.js"></script>
  <script src="reports.js"></script>
</body>
</html>
