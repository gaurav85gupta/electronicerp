<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electronics ERP — Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-card">
    <div class="login-header">
      <h1 class="login-title">Electronics ERP</h1>
      <p class="login-subtitle">Sign in to continue</p>
    </div>

    <form id="login-form" class="login-form" novalidate>
      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" autocomplete="current-password" />
          <button type="button" id="toggle-password" class="toggle-password" aria-label="Show password">Show</button>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" id="remember-username" />
          Remember username
        </label>
      </div>

      <p id="error-message" class="error-message" role="alert"></p>

      <button type="submit" id="login-button" class="login-button">
        <span id="login-button-text">Sign In</span>
      </button>
    </form>
  </main>
  <script src="login.js"></script>
</body>
</html>
